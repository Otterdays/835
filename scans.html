<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanned pages — Local 835</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="menu-btn" class="menu-btn" type="button" aria-label="Open Menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div id="side-panel" class="side-panel">
        <div class="panel-header">
            <h2>Navigation</h2>
            <button id="close-btn" class="close-btn" type="button" aria-label="Close Menu">&times;</button>
        </div>
        <ul class="nav-links" id="nav-links" aria-label="Site navigation"></ul>
    </div>
    <div id="panel-overlay" class="panel-overlay"></div>

    <div class="container archive-wide" id="main-container">
        <nav class="breadcrumb" aria-label="Breadcrumb" data-page-title="Scanned Pages"></nav>
        <header class="hero-header doc-hero">
            <div class="hero-heading">
                <div class="eyebrow-row">
                    <span class="eyebrow">Operating Engineers Local 835</span>
                    <span id="header-status" class="status-chip">Scanned Archive</span>
                </div>
                <h1 id="header-title">Scanned Pages</h1>
                <p id="header-parties" class="subtitle">Loading…</p>
                <div class="hero-meta">
                    <p id="header-date" class="date">Loading…</p>
                    <p id="view-description" class="view-description">Loading…</p>
                </div>
            </div>
            <div class="hero-stats hero-stats--compact" aria-label="Scan count">
                <div class="stat-card">
                    <span class="stat-label">Scanned pages</span>
                    <strong id="stat-pages" class="stat-value">0</strong>
                </div>
            </div>
        </header>

        <div id="gallery-container" class="gallery-container scan-root" aria-label="Scanned pages"></div>
    </div>

    <div id="image-modal" class="image-modal" aria-hidden="true" role="dialog" aria-labelledby="image-modal-caption">
        <button id="image-modal-close" class="image-modal-close" type="button" aria-label="Close image viewer">&times;</button>
        <div class="image-modal-body">
            <img id="image-modal-img" class="image-modal-img" alt="">
            <p id="image-modal-caption" class="image-modal-caption"></p>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="js/image-modal.js"></script>
    <script src="js/paneled-archive.js"></script>
    <script src="js/nav-config.js"></script>
    <script src="js/shell.js"></script>
    <script src="js/site-search.js"></script>
    <script src="js/scans-app.js"></script>
</body>
</html>
